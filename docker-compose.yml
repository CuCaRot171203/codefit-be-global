# Docker Compose cho CodeFit Backend - Production Deploy
# Chạy một lệnh: docker compose up -d --build

services:
  # ============ Backend App ============
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codefit_app
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: mysql://root:root@mysql:3306/codefit
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - codefit-network

  # ============ MySQL Database ============
  mysql:
    image: mysql:8
    container_name: codefit_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: codefit
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - codefit-network

  # ============ Redis Cache ============
  redis:
    image: redis:7-alpine
    container_name: codefit_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - codefit-network

  # ============ RabbitMQ Message Broker ============
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: codefit_rabbitmq
    restart: always
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - codefit-network

# ============ Volumes (Persist Data) ============
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

# ============ Network ============
networks:
  codefit-network:
    driver: bridge
